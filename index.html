<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>openshane - 欢迎来到我的世界</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #f8f9fa;
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        /* 物理小票容器 - 左上方 */
        #physics-receipt-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            cursor: grab;
        }
        
        #physics-receipt-container:active {
            cursor: grabbing;
        }
        
        #physics-receipt-container canvas {
            display: block;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.4));
        }
        
        .receipt-hint {
            position: fixed;
            top: 20px;
            left: 220px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            font-family: 'Courier New', monospace;
            z-index: 100;
            pointer-events: none;
        }
        
        /* 个人介绍卡片 */
        .profile-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            pointer-events: none;
        }
        
        .profile-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            pointer-events: auto;
            max-width: 360px;
        }
        
        .profile-card h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #ffe66d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .profile-card .bio {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }
        
        .profile-card .tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .profile-card .tag {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .profile-card .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        
        .profile-card .links a {
            color: #4ecdc4;
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .profile-card .links a:hover {
            color: #ffe66d;
        }
        
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="physics-receipt-container"></div>
    <div class="receipt-hint">👆 拖动小票</div>
    
    <div class="profile-overlay">
        <div class="profile-card">
            <img src="https://avatars.githubusercontent.com/u/112454509?v=4" style="width:80px;height:80px;border-radius:50%;border:3px solid #ff6b6b;margin-bottom:15px;">
            <h1>openshane 👋</h1>
            <p class="bio">🚀 全栈开发者 | 技术爱好者 | 终身学习者</p>
            <div class="tags">
                <span class="tag">🔧 Python</span>
                <span class="tag">🌐 Web</span>
                <span class="tag">🤖 AI/ML</span>
                <span class="tag">🎮 Three.js</span>
            </div>
            <div class="links">
                <a href="https://github.com/openshane" target="_blank">GitHub</a>
                <a href="mailto:xieshuai.china@gmail.com">Email</a>
            </div>
        </div>
    </div>
    
    <div class="hint">👆 用鼠标抓取左上角小票</div>
    
    <script>
        // ==================== VERLET PHYSICS ====================
        
        class VerletPoint {
            constructor(x, y, z, pinned = false) {
                this.position = new THREE.Vector3(x, y, z);
                this.oldPosition = new THREE.Vector3(x, y, z);
                this.acceleration = new THREE.Vector3(0, 0, 0);
                this.pinned = pinned;
                this.mass = 1;
            }
            
            update(deltaTime, damping) {
                if (this.pinned) return;
                
                const velocity = this.position.clone().sub(this.oldPosition);
                velocity.multiplyScalar(damping);
                
                this.oldPosition.copy(this.position);
                this.position.add(velocity);
                this.position.add(this.acceleration.clone().multiplyScalar(deltaTime * deltaTime));
                
                this.acceleration.set(0, 0, 0);
            }
            
            applyForce(force) {
                if (this.pinned) return;
                this.acceleration.add(force.clone().divideScalar(this.mass));
            }
        }
        
        class VerletConstraint {
            constructor(p1, p2, restLength) {
                this.p1 = p1;
                this.p2 = p2;
                this.restLength = restLength || p1.position.distanceTo(p2.position);
                this.stiffness = 1.0;
            }
            
            solve() {
                const diff = this.p2.position.clone().sub(this.p1.position);
                const distance = diff.length();
                const difference = (this.restLength - distance) / distance;
                
                const correction = diff.multiplyScalar(difference * 0.5 * this.stiffness);
                
                if (!this.p1.pinned) {
                    this.p1.position.sub(correction);
                }
                if (!this.p2.pinned) {
                    this.p2.position.add(correction);
                }
            }
        }
        
        class Cloth {
            constructor(width, height, segmentsX, segmentsY) {
                this.width = width;
                this.height = height;
                this.segmentsX = segmentsX;
                this.segmentsY = segmentsY;
                
                this.points = [];
                this.constraints = [];
                
                this.createPoints();
                this.createConstraints();
            }
            
            createPoints() {
                const spacingX = this.width / this.segmentsX;
                const spacingY = this.height / this.segmentsY;
                
                for (let y = 0; y <= this.segmentsY; y++) {
                    for (let x = 0; x <= this.segmentsX; x++) {
                        const px = (x - this.segmentsX / 2) * spacingX;
                        const py = (this.segmentsY / 2 - y) * spacingY;
                        const pz = 0;
                        
                        const pinned = (y === 0);
                        this.points.push(new VerletPoint(px, py, pz, pinned));
                    }
                }
            }
            
            createConstraints() {
                const cols = this.segmentsX + 1;
                
                for (let y = 0; y <= this.segmentsY; y++) {
                    for (let x = 0; x <= this.segmentsX; x++) {
                        const idx = y * cols + x;
                        
                        if (x < this.segmentsX) {
                            this.constraints.push(new VerletConstraint(
                                this.points[idx],
                                this.points[idx + 1]
                            ));
                        }
                        
                        if (y < this.segmentsY) {
                            this.constraints.push(new VerletConstraint(
                                this.points[idx],
                                this.points[idx + cols]
                            ));
                        }
                        
                        if (x < this.segmentsX && y < this.segmentsY) {
                            const diagLength = Math.sqrt(2) * (this.width / this.segmentsX);
                            this.constraints.push(new VerletConstraint(
                                this.points[idx],
                                this.points[idx + cols + 1],
                                diagLength
                            ));
                            this.constraints.push(new VerletConstraint(
                                this.points[idx + 1],
                                this.points[idx + cols],
                                diagLength
                            ));
                        }
                    }
                }
            }
            
            update(deltaTime, iterations) {
                const gravity = new THREE.Vector3(0, -15, 0);
                for (const point of this.points) {
                    point.applyForce(gravity);
                }
                
                for (const point of this.points) {
                    point.update(deltaTime, 0.98);
                }
                
                for (let i = 0; i < iterations; i++) {
                    for (const constraint of this.constraints) {
                        constraint.solve();
                    }
                }
            }
        }
        
        // ==================== THREE.JS SETUP ====================
        
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 10);
        scene.add(directionalLight);
        
        const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
        backLight.position.set(-5, -5, -10);
        scene.add(backLight);
        
        // ==================== RECEIPT MESH ====================
        
        const receiptWidth = 2.8;
        const receiptHeight = 7;
        const segmentsX = 15;
        const segmentsY = 30;
        
        const cloth = new Cloth(receiptWidth, receiptHeight, segmentsX, segmentsY);
        
        const geometry = new THREE.PlaneGeometry(
            receiptWidth, 
            receiptHeight, 
            segmentsX, 
            segmentsY
        );
        
        // 小票 Canvas 纹理 - 个人介绍版本
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#f8f8f0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 装饰纹理
        for(let y=0;y<canvas.height;y+=2){
            ctx.fillStyle=`rgba(0,0,0,${0.006+Math.random()*0.004})`;
            ctx.fillRect(0,y,canvas.width,1);
        }
        
        ctx.fillStyle = '#333';
        ctx.font = 'bold 36px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('OPENSHANE', 256, 55);
        
        ctx.font = '20px Courier New';
        ctx.fillStyle = '#666';
        ctx.fillText('PERSONAL PROFILE', 256, 90);
        ctx.fillText('Welcome! 👋', 256, 115);
        
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);
        ctx.beginPath();
        ctx.moveTo(40, 140);
        ctx.lineTo(472, 140);
        ctx.stroke();
        
        // 个人介绍内容
        ctx.setLineDash([]);
        ctx.font = '18px Courier New';
        ctx.fillStyle = '#333';
        ctx.textAlign = 'left';
        
        const items = [
            ['Developer · Creator', '🚀'],
            ['Full Stack Engineer', '💻'],
            ['AI/ML Enthusiast', '🤖'],
            ['Three.js Fan', '🎮'],
            ['Coffee Addict', '☕'],
            [' lifelong Learner', '📚'],
        ];
        
        items.forEach((item, i) => {
            const y = 175 + i * 50;
            ctx.fillStyle = '#666';
            ctx.fillText(item[1] + ' ' + item[0], 45, y);
            
            if (i < items.length - 1) {
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.moveTo(40, y + 15);
                ctx.lineTo(472, y + 15);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        });
        
        ctx.setLineDash([8, 4]);
        ctx.strokeStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(40, 520);
        ctx.lineTo(472, 520);
        ctx.stroke();
        
        ctx.setLineDash([]);
        ctx.font = 'bold 22px Courier New';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#333';
        ctx.fillText('TOTAL', 45, 555);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ff6b6b';
        ctx.fillText('PRICELESS', 467, 555);
        
        ctx.font = '16px Courier New';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#999';
        ctx.fillText('Thank you for visiting!', 256, 610);
        ctx.fillText('Keep Coding! ✨', 256, 640);
        ctx.fillText('openshane.github.io', 256, 680);
        
        const texture = new THREE.CanvasTexture(canvas);
        
        const material = new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.75,
            metalness: 0.0,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.98
        });
        
        const receiptMesh = new THREE.Mesh(geometry, material);
        scene.add(receiptMesh);
        
        // ==================== INTERACTION ====================
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedPoint = null;
        let isDragging = false;
        
        function onMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObject(receiptMesh);
            
            if (intersects.length > 0) {
                const point = intersects[0].point;
                
                let minDist = Infinity;
                let nearest = null;
                
                for (const p of cloth.points) {
                    if (p.pinned) continue;
                    const dist = p.position.distanceTo(point);
                    if (dist < minDist && dist < 0.8) {
                        minDist = dist;
                        nearest = p;
                    }
                }
                
                if (nearest) {
                    selectedPoint = nearest;
                    isDragging = true;
                }
            }
        }
        
        function onMouseMove(event) {
            if (!isDragging || !selectedPoint) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
            vector.unproject(camera);
            
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            const pos = camera.position.clone().add(dir.multiplyScalar(distance));
            
            pos.x = Math.max(-4, Math.min(4, pos.x));
            pos.y = Math.max(-6, Math.min(6, pos.y));
            
            selectedPoint.position.copy(pos);
            selectedPoint.oldPosition.copy(pos);
        }
        
        function onMouseUp() {
            isDragging = false;
            selectedPoint = null;
        }
        
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        window.addEventListener('touchstart', function(e) {
            if (e.touches.length > 0) {
                onMouseDown({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
            }
        }, { passive: false });
        
        window.addEventListener('touchmove', function(e) {
            if (e.touches.length > 0) {
                onMouseMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
            }
        }, { passive: false });
        
        window.addEventListener('touchend', onMouseUp);
        
        // ==================== UPDATE GEOMETRY ====================
        
        function updateGeometry() {
            const positions = geometry.attributes.position;
            
            for (let i = 0; i < cloth.points.length; i++) {
                const point = cloth.points[i];
                positions.setXYZ(i, point.position.x, point.position.y, point.position.z);
            }
            
            positions.needsUpdate = true;
            geometry.computeVertexNormals();
        }
        
        // ==================== ANIMATION ====================
        
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.016);
            
            cloth.update(delta, 8);
            
            updateGeometry();
            
            renderer.render(scene, camera);
        }
        
        // ==================== RESIZE ====================
        
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
