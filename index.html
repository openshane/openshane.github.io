<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Receipt - Three.js Physics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f5f5f0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="hint">👆 用鼠标抓取小票</div>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        
        // ==================== VERLET PHYSICS ====================
        
        class VerletPoint {
            constructor(x, y, z, pinned = false) {
                this.position = new THREE.Vector3(x, y, z);
                this.oldPosition = new THREE.Vector3(x, y, z);
                this.acceleration = new THREE.Vector3(0, 0, 0);
                this.pinned = pinned;
                this.mass = 1;
            }
            
            update(deltaTime, damping = 0.98) {
                if (this.pinned) return;
                
                const velocity = this.position.clone().sub(this.oldPosition);
                velocity.multiplyScalar(damping);
                
                this.oldPosition.copy(this.position);
                this.position.add(velocity);
                this.position.add(this.acceleration.multiplyScalar(deltaTime * deltaTime));
                
                this.acceleration.set(0, 0, 0);
            }
            
            applyForce(force) {
                if (this.pinned) return;
                this.acceleration.add(force.clone().divideScalar(this.mass));
            }
        }
        
        class VerletConstraint {
            constructor(p1, p2, restLength = null) {
                this.p1 = p1;
                this.p2 = p2;
                this.restLength = restLength || p1.position.distanceTo(p2.position);
                this.stiffness = 1.0;
            }
            
            solve() {
                const diff = this.p2.position.clone().sub(this.p1.position);
                const distance = diff.length();
                const difference = (this.restLength - distance) / distance;
                
                const correction = diff.multiplyScalar(difference * 0.5 * this.stiffness);
                
                if (!this.p1.pinned) {
                    this.p1.position.sub(correction);
                }
                if (!this.p2.pinned) {
                    this.p2.position.add(correction);
                }
            }
        }
        
        class Cloth {
            constructor(width, height, segmentsX, segmentsY) {
                this.width = width;
                this.height = height;
                this.segmentsX = segmentsX;
                this.segmentsY = segmentsY;
                
                this.points = [];
                this.constraints = [];
                
                this.createPoints();
                this.createConstraints();
            }
            
            createPoints() {
                const spacingX = this.width / this.segmentsX;
                const spacingY = this.height / this.segmentsY;
                
                for (let y = 0; y <= this.segmentsY; y++) {
                    for (let x = 0; x <= this.segmentsX; x++) {
                        const px = (x - this.segmentsX / 2) * spacingX;
                        const py = (this.segmentsY / 2 - y) * spacingY;
                        const pz = 0;
                        
                        // 顶部整行固定
                        const pinned = (y === 0);
                        this.points.push(new VerletPoint(px, py, pz, pinned));
                    }
                }
            }
            
            createConstraints() {
                const cols = this.segmentsX + 1;
                
                for (let y = 0; y <= this.segmentsY; y++) {
                    for (let x = 0; x <= this.segmentsX; x++) {
                        const idx = y * cols + x;
                        
                        // 结构约束 - 水平
                        if (x < this.segmentsX) {
                            this.constraints.push(new VerletConstraint(
                                this.points[idx],
                                this.points[idx + 1]
                            ));
                        }
                        
                        // 结构约束 - 垂直
                        if (y < this.segmentsY) {
                            this.constraints.push(new VerletConstraint(
                                this.points[idx],
                                this.points[idx + cols]
                            ));
                        }
                        
                        // 剪切约束 - 对角线（增加稳定性）
                        if (x < this.segmentsX && y < this.segmentsY) {
                            this.constraints.push(new VerletConstraint(
                                this.points[idx],
                                this.points[idx + cols + 1],
                                Math.sqrt(2) * (this.width / this.segmentsX)
                            ));
                            this.constraints.push(new VerletConstraint(
                                this.points[idx + 1],
                                this.points[idx + cols],
                                Math.sqrt(2) * (this.width / this.segmentsX)
                            ));
                        }
                    }
                }
            }
            
            update(deltaTime, iterations = 5) {
                // 应用重力
                const gravity = new THREE.Vector3(0, -9.8, 0);
                for (const point of this.points) {
                    point.applyForce(gravity);
                }
                
                // 更新点
                for (const point of this.points) {
                    point.update(deltaTime, 0.99);
                }
                
                // 求解约束
                for (let i = 0; i < iterations; i++) {
                    for (const constraint of this.constraints) {
                        constraint.solve();
                    }
                }
            }
            
            getPositions() {
                return this.points.map(p => p.position.clone());
            }
        }
        
        // ==================== THREE.JS SETUP ====================
        
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f0);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 10);
        scene.add(directionalLight);
        
        const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
        backLight.position.set(-5, -5, -10);
        scene.add(backLight);
        
        // ==================== RECEIPT MESH ====================
        
        const receiptWidth = 3.5;
        const receiptHeight = 8;
        const segmentsX = 20;
        const segmentsY = 40;
        
        const cloth = new Cloth(receiptWidth, receiptHeight, segmentsX, segmentsY);
        
        // 创建几何体
        const geometry = new THREE.PlaneGeometry(
            receiptWidth, 
            receiptHeight, 
            segmentsX, 
            segmentsY
        );
        
        // 热敏纸材质
        const material = new THREE.MeshStandardMaterial({
            color: 0xf8f8f0,
            roughness: 0.8,
            metalness: 0.0,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.95
        });
        
        const receiptMesh = new THREE.Mesh(geometry, material);
        scene.add(receiptMesh);
        
        // 打印内容（使用 canvas 纹理）
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        
        // 绘制小票内容
        ctx.fillStyle = '#f8f8f0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#333';
        ctx.font = 'bold 36px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('🧾 RECEIPT', 256, 60);
        
        ctx.font = '20px Courier New';
        ctx.fillStyle = '#666';
        ctx.fillText('Welcome to my world!', 256, 95);
        
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(40, 120);
        ctx.lineTo(472, 120);
        ctx.stroke();
        
        // 购物清单 - 搞笑 3D 图形术语
        const items = [
            ['Vertex Buffer', '∞'],
            ['Fragment Shader', '100%'],
            ['Normal Map', '2KB'],
            ['Ambient Occlusion', 'ON'],
            ['Ray Marching', '50次'],
            ['Gaussian Blur', '5px'],
            ['Depth Buffer', '24bit'],
            ['Mipmap Level', 'LOD3'],
            ['Backface Culling', 'ON'],
            ['Z-Buffer Test', 'PASS'],
            ['Alpha Blend', '50%'],
            ['Specular Highlight', '高光'],
            ['Fresnel Effect', '反射'],
            ['Tone Mapping', 'ACES'],
            ['Anti-Aliasing', 'MSAA8x']
        ];
        
        ctx.setLineDash([]);
        ctx.font = '24px Courier New';
        
        items.forEach((item, i) => {
            const y = 160 + i * 45;
            ctx.fillStyle = '#333';
            ctx.textAlign = 'left';
            ctx.fillText(item[0], 50, y);
            ctx.textAlign = 'right';
            ctx.fillStyle = '#666';
            ctx.fillText(item[1], 462, y);
            
            if (i < items.length - 1) {
                ctx.strokeStyle = '#ddd';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(40, y + 15);
                ctx.lineTo(472, y + 15);
                ctx.stroke();
            }
        });
        
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(40, 920);
        ctx.lineTo(472, 920);
        ctx.stroke();
        
        ctx.setLineDash([]);
        ctx.font = 'bold 28px Courier New';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#333';
        ctx.fillText('TOTAL', 50, 960);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ff6b6b';
        ctx.fillText('Priceless', 462, 960);
        
        ctx.font = '18px Courier New';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#999';
        ctx.fillText('Thank you for visiting!', 256, 1010);
        
        // 创建纹理
        const texture = new THREE.CanvasTexture(canvas);
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        
        const printMaterial = new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.7,
            metalness: 0.0,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.98
        });
        
        receiptMesh.material = printMaterial;
        
        // ==================== INTERACTION ====================
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedPoint = null;
        let isDragging = false;
        
        function onMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObject(receiptMesh);
            
            if (intersects.length > 0) {
                const point = intersects[0].point;
                
                // 找到最近的未固定点
                let minDist = Infinity;
                let nearest = null;
                
                for (const p of cloth.points) {
                    if (p.pinned) continue;
                    const dist = p.position.distanceTo(point);
                    if (dist < minDist && dist < 1) {
                        minDist = dist;
                        nearest = p;
                    }
                }
                
                if (nearest) {
                    selectedPoint = nearest;
                    isDragging = true;
                }
            }
        }
        
        function onMouseMove(event) {
            if (!isDragging || !selectedPoint) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // 将鼠标位置投射到 3D 空间
            const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
            vector.unproject(camera);
            
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            const pos = camera.position.clone().add(dir.multiplyScalar(distance));
            
            // 限制拖动范围
            pos.x = Math.max(-5, Math.min(5, pos.x));
            pos.y = Math.max(-8, Math.min(8, pos.y));
            
            selectedPoint.position.copy(pos);
            selectedPoint.oldPosition.copy(pos);
        }
        
        function onMouseUp() {
            isDragging = false;
            selectedPoint = null;
        }
        
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        // 触摸支持
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            onMouseDown({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
        });
        
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            onMouseMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
        });
        
        window.addEventListener('touchend', onMouseUp);
        
        // ==================== UPDATE GEOMETRY ====================
        
        function updateGeometry() {
            const positions = geometry.attributes.position;
            
            for (let i = 0; i < cloth.points.length; i++) {
                const point = cloth.points[i];
                positions.setXYZ(i, point.position.x, point.position.y, point.position.z);
            }
            
            positions.needsUpdate = true;
            geometry.computeVertexNormals();
        }
        
        // ==================== ANIMATION ====================
        
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.02);
            
            // 更新物理
            cloth.update(delta, 8);
            
            // 更新几何体
            updateGeometry();
            
            renderer.render(scene, camera);
        }
        
        // ==================== RESIZE ====================
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
